  domain.AuditLog:
    properties:
      action:
        $ref: '#/definitions/domain.AuditAction'
      actor_role:
        allOf:
        - $ref: '#/definitions/domain.Role'
        enum:
        - SUPER_ADMIN
        - ADMIN
        - TUTOR
        - STUDENT
      actor_user_id:
        type: string
      after_state:
        description: JSON snapshot of resource after change
        type: object
      before_state:
        description: JSON snapshot of resource before change
        type: object
      changes:
        additionalProperties: true
        description: Field-level changes for updates
        type: object
      created_at:
        type: string
      id:
        type: string
      ip_address:
        type: string
      is_sensitive:
        description: True for sensitive actions (billing, suspension, etc.)
        type: boolean
      metadata:
        additionalProperties: true
        description: Additional context
        type: object
      resource_id:
        type: string
      resource_name:
        description: Human-readable resource name
        maxLength: 200
        type: string
      resource_type:
        $ref: '#/definitions/domain.AuditResourceType'
