definitions:
  domain.Answer:
    properties:
      answer_text:
        type: string
      feedback:
        description: Tutor feedback for manual grading
        maxLength: 1000
        type: string
      is_correct:
        description: For auto-gradable questions
        type: boolean
      marks_earned:
        type: integer
      question_id:
        type: string
      selected_options:
        description: For multiple choice/answer
        items:
          type: string
        type: array
    required:
    - question_id
    type: object
  domain.AssessmentStatus:
    enum:
    - DRAFT
    - PUBLISHED
    - ARCHIVED
    type: string
    x-enum-varnames:
    - AssessmentStatusDraft
    - AssessmentStatusPublished
    - AssessmentStatusArchived
  domain.Assignment:
    properties:
      allow_late_submission:
        type: boolean
      allowed_file_formats:
        description: e.g., ["pdf", "docx", "jpg"]
        items:
          type: string
        type: array
      attachment_urls:
        items:
          type: string
        type: array
      class_id:
        type: string
      course_id:
        type: string
      created_at:
        type: string
      created_by_tutor_id:
        type: string
      description:
        maxLength: 5000
        minLength: 10
        type: string
      hard_cutoff_date:
        description: If set, no submissions after this
        type: string
      id:
        type: string
      max_file_size:
        description: in bytes (max 100MB)
        maximum: 104857600
        minimum: 1
        type: integer
      max_marks:
        maximum: 100
        minimum: 1
        type: integer
      published_at:
        type: string
      questions:
        description: Optional structured questions
        items:
          $ref: '#/definitions/domain.Question'
        type: array
      status:
        allOf:
        - $ref: '#/definitions/domain.AssessmentStatus'
        enum:
        - DRAFT
        - PUBLISHED
        - ARCHIVED
      submission_deadline:
        type: string
      tenant_id:
        type: string
      title:
        maxLength: 200
        minLength: 3
        type: string
      updated_at:
        type: string
    required:
    - class_id
    - course_id
    - created_at
    - created_by_tutor_id
    - description
    - id
    - max_file_size
    - max_marks
    - status
    - submission_deadline
    - tenant_id
    - title
    - updated_at
    type: object
  domain.AssignmentSubmission:
    properties:
      answer_text:
        description: For text-based submissions
        maxLength: 10000
        type: string
      assignment_id:
        type: string
      created_at:
        type: string
      feedback:
        maxLength: 2000
        type: string
      file_urls:
        items:
          type: string
        type: array
      graded_at:
        type: string
      graded_by:
        type: string
      id:
        type: string
      ip_address:
        type: string
      is_late:
        type: boolean
      score:
        type: integer
      status:
        allOf:
        - $ref: '#/definitions/domain.SubmissionStatus'
        enum:
        - NOT_STARTED
        - IN_PROGRESS
        - SUBMITTED
        - LATE
        - GRADED
      student_id:
        type: string
      submitted_at:
        type: string
      tenant_id:
        type: string
      updated_at:
        type: string
    required:
    - assignment_id
    - created_at
    - id
    - status
    - student_id
    - tenant_id
    - updated_at
    type: object
  domain.AttendanceRecord:
    properties:
      percentage:
